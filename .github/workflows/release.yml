name: Publish to PyPI

# Fires on tag push matching v* (e.g. v0.6.1, v0.7.0). Also supports
# manual firing from the Actions tab via workflow_dispatch for
# re-runs or out-of-band publishes. Publish is gated by the 'pypi'
# GitHub Environment, which can be configured to require manual
# approval before the deployment job runs.
#
# Auth: OpenID Connect (OIDC) — no PyPI tokens stored in the repo
# or environment. PyPI verifies the workflow identity via a Trusted
# Publisher configuration at
#   https://pypi.org/manage/project/pact-passport/settings/publishing/
# matching: owner=bene-art, repo=pact-passport, workflow=release.yml,
# environment=pypi.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Verify pyproject.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match pyproject.toml version $PROJECT_VERSION"
            exit 1
          fi
          echo "version match: v$TAG_VERSION"

      - name: Build distributions
        run: python -m build

      - name: Verify with twine
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pact-passport
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via OIDC trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Slice CHANGELOG.md between "## [VERSION]" and the next "## ["
          # heading. Empty body falls back to a one-line link to the full
          # changelog so the GitHub Release is never blank.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if ($0 ~ "\\[" ver "\\]") { found=1; print; next }
              else if (found) exit
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "## [$VERSION]" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." >> release_notes.md
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Download built distributions (for asset attach)
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
